<!DOCTYPE html>
<head>
    <title>Reorder channels | Watch with FritzBox</title>
    <script src="https://cdn.polyfill.io/v2/polyfill.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch-polyfill@1.0.0/DragDropTouch.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5sortable/0.13.3/html5sortable.min.js" integrity="sha512-3btxfhQfasdVcv1dKYZph5P7jFeeLRcF1gDVzFA+k9AiwwhB1MNI7O58zCK0uVItuMHNDR5pMoF2nqlCGzUwZQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <div class="content">
        <h1><a href="/"><img src="asset?name=chevron_back.svg&contentType=image/svg+xml"> Channel list</a></h1>
        <div class="disclamer">💻 PC users: Drag and drop the channels to the desired position.</div>
        <div class="disclamer">📱 Mobile users: Long-tap and move the channels to the desired position.</div>
        <div id="channelCards">
        </div>
    </div>
</body>

<style>

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    .content {
        display: flex;
        flex-direction: column;
        max-width: 1000px;
        margin-left: auto;
        margin-right: auto;
    }

    h1 {
        margin-top: 25px;
        margin-left: 25px;
    }

    .disclamer:first-of-type {
        margin-top: 10px;
    }

    .disclamer {
        margin-left: 25px;
    }

    body {
        background-color: #181725;
        color: #ffffff;
        font-family: Tahoma;
        height: 100%;
        width: 100%;
        overscroll-behavior: none;
    }

    .card {
        display: flex;
        justify-content: space-between;
        border-radius: 15px;
        background-color: #2a2939 !important;
        width: calc(100% - 50px);
        height: 75px;
        margin-top: 10px;
        margin-right: 25px;
        margin-left: 25px;
        padding-top: 25px;
        padding-bottom: 25px;
        padding-left: 10px;
        padding-right: 10px;
        box-sizing: border-box;
        box-shadow: 0px 0px 35px -10px rgba(0, 0, 0, 0.5);
        transition: transform 100ms linear;
        overflow: hidden;
        cursor: grab;
        align-items: center;
    }

    .card:active {
        cursor: grabbing;
    }

    .card:hover {
        transform: scale(1.02) translateZ(0);
    }

    .cardLogo {
        height: 100%;
        min-width: 100px;
        width: 25%;
        max-width: 200px;
        background-repeat: no-repeat;
        background-position: center;
        background-size: contain;
    }

    .cardInfo {
        width: 100%;
        padding: 25px;
        font-size: 16pt;
        display: flex;
        justify-content: space-between;
        flex-grow: 1;
        align-items: center;
        flex-wrap: wrap;
        gap: 5px;
    }

    .cardEdit {
        padding: 25px;
        cursor: pointer;
    }

    .channelLock {
        padding-left: 3px;
        padding-right: 3px;
        width: max-content;
        font-size: 10pt;
    }

    .channelBadge {
        border: #c4c3c8;
        border-style: solid;
        border-radius: 5px;
        padding-left: 3px;
        padding-right: 3px;
        width: max-content;
        color: #c4c3c8;
        font-weight: bold;
        font-size: 10pt;
    }

    .channelBadgeFilled {
        border: #c4c3c8;
        background-color: #c4c3c8;
        border-style: solid;
        border-radius: 5px;
        padding-left: 3px;
        padding-right: 3px;
        width: max-content;
        color: #000000;
        font-weight: bold;
        font-size: 10pt;
    }

    .badges {
        display: flex;
        gap: 5px;
        align-items: center;
        justify-content: flex-end;
    }

    .placeholderDrag {
        border-radius: 15px;
        background-color: #4c4c57 !important;
        width: calc(100% - 50px);
        height: 75px;
        margin-top: 10px;
        margin-right: 25px;
        margin-left: 25px;
    }

    a, a:hover, a:visited, a:active {
        color: inherit;
        text-decoration: none;
    }

    @media only screen and (max-width: 650px) {
      .badges {
        width: 100%;
        justify-content: flex-start;
      }
      .card, .placeholderDrag {
        height: 100px;
      }
    }

</style>

<script>

    const channelCardTemplate = `
    <div class="card" draggable="true">
        <div class="cardLogo" style="background-image: url('%LOGOURL%')"></div>
        <div class="cardInfo">
            <div>%CHANNELNAME%</div>
            <div class="badges">
                <span id="channelNumber" class="channelBadge">CH %CHANNELNUMBER%</span>
                <span class="channelBadgeFilled">%CHANNELBADGE%</span>
                %CHANNELLOCK%
            </div>
        </div>
        <div class="cardEdit" onclick="move(%CHANNELNUMBER%)"><img src="asset?name=edit.svg&contentType=image/svg+xml"></div>
    </div>`;

    const channelCards = document.getElementById("channelCards");
    updateChannels();

    function updateChannels(){
        fetch('/channels')
            .then(res => res.json())
            .then(j => {
                replaceDisplayedChannels(j);
                console.log("Channels fetched", j);
            }).catch(() => {
                alert('An error occurred while getting the channels. Please try again later.');
            });
    }

    function moveChannel(channelNumberFrom, channelNumberTo){
        fetch('/moveChannel?from='+channelNumberFrom+'&to='+channelNumberTo)
            .then(res => res.json())
            .then(j => {
                replaceDisplayedChannels(j);
                console.log("Channel moved", j);
            }).catch(() => {
                alert('An error occurred while moving the channel. Please try again later.');
            });
    }

    function replaceDisplayedChannels(channels) {
        var newInnerHTML = "";
        for(const channel of channels){
            const channelCard = channelCardTemplate.replaceAll("%LOGOURL%", channel.logoUrl)
                .replaceAll("%CHANNELNAME%", channel.name)
                .replaceAll("%CHANNELNUMBER%", channel.number)
                .replaceAll("%CHANNELBADGE%", channel.type)
                .replaceAll("%CHANNELLOCK%", channel.isLocked ? "<span class='channelLock'>🔒</span>" : "");
            newInnerHTML += channelCard;
        }
        channelCards.innerHTML = newInnerHTML;
    }

    function httpGetAsync(theUrl, callback)
    {
        var xmlHttp = new XMLHttpRequest();
        xmlHttp.onreadystatechange = function() {
            if (xmlHttp.readyState == 4 && xmlHttp.status == 200)
                callback(xmlHttp.responseText);
        }
        xmlHttp.open("GET", theUrl, true); // true for asynchronous
        xmlHttp.send(null);
    }

    sortable('#channelCards', {
      placeholderClass: 'placeholderDrag'
    });

    sortable('#channelCards')[0].addEventListener('sortupdate', function(e) {

        const channelMovedItem = e.detail.item;
        var channelNumberFrom = channelMovedItem.querySelector("#channelNumber").innerText.replace("CH ", "");

        var i = 1;
        for(const item of e.detail.destination.items){
            const channelNumberElem = item.querySelector("#channelNumber");
            channelNumberElem.innerText = "CH "+i;
            i++;
        }

        var channelNumberTo = channelMovedItem.querySelector("#channelNumber").innerText.replace("CH ", "");

        moveChannel(channelNumberFrom, channelNumberTo);
    });

    function move(channelNumber) {
        const input = window.prompt("Move channel "+channelNumber+" to position:", channelNumber);
        if(input != null && input >>> 0 === parseFloat(input)){
            moveChannel(channelNumber, input);
        }
    }



</script>

</html>
